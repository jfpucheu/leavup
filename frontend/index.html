<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO principal -->
    <title>Leavup — Logiciel de gestion des congés et absences pour PME</title>
    <meta name="description" content="Leavup simplifie la gestion des congés payés, RTT et absences pour les PME. Demandes en ligne, validation en un clic, planning visuel. Essai gratuit — hébergé en France, conforme RGPD." />
    <meta name="keywords" content="gestion des congés, logiciel congés payés, gestion absences PME, suivi congés salariés, RTT, demande congé en ligne, planning absences, RGPD" />
    <link rel="canonical" href="https://leavup.com/" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="robots" content="index, follow, max-snippet:-1" />

    <!-- Open Graph (partage réseaux sociaux) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://leavup.com/" />
    <meta property="og:title"       content="Leavup — Gestion des congés simplifiée pour votre équipe" />
    <meta property="og:description" content="Planifiez, validez et suivez les congés de vos employés — sans paperasse, sans Excel. Gratuit jusqu'à 10 utilisateurs. Hébergé et développé en France." />
    <meta property="og:image"       content="https://leavup.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="fr_FR" />
    <meta property="og:site_name"   content="Leavup" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Leavup — Logiciel de gestion des congés pour PME" />
    <meta name="twitter:description" content="Simplifiez la gestion des absences et congés payés de votre équipe. Gratuit jusqu'à 10 utilisateurs, hébergé en France." />
    <meta name="twitter:image"       content="https://leavup.com/og-image.png" />

    <!-- Données structurées JSON-LD (SoftwareApplication) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Leavup",
      "url": "https://leavup.com",
      "description": "Logiciel de gestion des congés payés, RTT et absences pour PME françaises. Demandes en ligne, validation rapide, planning visuel, conforme RGPD.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Plan Gratuit",
          "price": "0",
          "priceCurrency": "EUR",
          "description": "1 administrateur + 9 employés, toutes les fonctionnalités incluses"
        },
        {
          "@type": "Offer",
          "name": "Plan Pro",
          "description": "Utilisateurs illimités, support prioritaire, onboarding accompagné"
        }
      ],
      "publisher": {
        "@type": "Organization",
        "name": "Leavup",
        "url": "https://leavup.com",
        "address": { "@type": "PostalAddress", "addressCountry": "FR" }
      }
    }
    </script>

    <!-- FAQ structurée (rich snippets Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Leavup est-il gratuit ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui, Leavup est gratuit pour 1 administrateur et jusqu'à 9 employés (10 utilisateurs au total). Le plan Pro, pour les équipes plus importantes, est disponible sur devis." }
        },
        {
          "@type": "Question",
          "name": "Les données sont-elles hébergées en France ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui, Leavup est hébergé et développé en France. Toutes les données personnelles sont chiffrées et le service est conforme au RGPD." }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne la gestion des congés avec Leavup ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Les salariés soumettent leurs demandes d'absence en ligne depuis n'importe quel appareil. L'administrateur (ou un chef d'équipe délégué) reçoit une notification et valide ou refuse en un clic. Le salarié est notifié par email automatiquement." }
        },
        {
          "@type": "Question",
          "name": "Leavup gère-t-il les RTT ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui, Leavup gère les congés payés (CP), les RTT et les congés sans solde. Les soldes sont calculés automatiquement selon les règles légales françaises." }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', system-ui, sans-serif; }
      input, textarea, button, select { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
