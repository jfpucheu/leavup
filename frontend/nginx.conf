map $http_user_agent $is_bot {
    default          0;
    "~*googlebot"    1;
    "~*bingbot"      1;
    "~*slurp"        1;
    "~*duckduckbot"  1;
    "~*baiduspider"  1;
    "~*yandexbot"    1;
    "~*applebot"     1;
    "~*facebookexternalhit" 1;
    "~*twitterbot"   1;
    "~*linkedinbot"  1;
    "~*slackbot"     1;
    "~*whatsapp"     1;
    "~*ahrefsbot"    1;
    "~*semrushbot"   1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Headers de sécurité HTTP ──────────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                            always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-XSS-Protection           "1; mode=block"                   always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none';" always;

    # Compression gzip (améliore les Core Web Vitals)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache statique long pour les assets buildés (hash dans le nom)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Servir la page pré-rendue aux robots d'indexation
    location = / {
        if ($is_bot) {
            rewrite ^ /prerender.html break;
        }
        try_files $uri /index.html;
    }

    location = /mentions-legales   { try_files /mentions-legales.html =404; }
    location = /fonctionnalites    { try_files /fonctionnalites.html =404; }
    location = /tarifs             { try_files /tarifs.html =404; }
    location = /vs-excel           { try_files /vs-excel.html =404; }
    location = /guide-conges-payes { try_files /guide-conges-payes.html =404; }
    location = /comparatif         { try_files /comparatif.html =404; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass                https://backend:3000;
        proxy_ssl_verify          off;   # certificat auto-signé interne
        proxy_ssl_server_name     on;
        proxy_set_header Host     $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
